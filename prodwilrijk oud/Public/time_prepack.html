<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Prepack</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts_time_prepack.js" defer></script>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="container">
        <h1>Time Prepack</h1>
        <input type="text" id="search-input" placeholder="Search items...">
        <table>
            <thead>
                <tr>
                    <th>Item Number</th>
                    <th>PO Number</th>
                    <th>Amount</th>
                    <th>Confirmed At</th>
                    <th>Packed At</th>
                    <th>Duration (hours)</th>
                </tr>
            </thead>
            <tbody id="time-prepack-table-body">
                <!-- Data will be inserted here by JavaScript -->
            </tbody>
        </table>
    </div>
</body>
</html>
