<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Scheduler - Narrowcast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1f6feb;
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #7d8590;
        }
        
        body {
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: var(--text-primary);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        .navbar {
            background: var(--bg-card) !important;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .calendar-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            margin: 2rem;
        }
        
        /* Custom Calendar Styles */
        .calendar {
            background: var(--bg-dark);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .calendar-header {
            background: var(--bg-card);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        
        .calendar-title {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .calendar-nav {
            display: flex;
            gap: 0.5rem;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        
        .calendar-day-header {
            background: var(--bg-card);
            padding: 0.75rem;
            text-align: center;
            font-weight: 600;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        
        .calendar-day {
            min-height: 120px;
            border: 1px solid var(--border-color);
            padding: 0.5rem;
            background: var(--bg-dark);
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .calendar-day:hover {
            background: rgba(31, 111, 235, 0.1);
        }
        
        .calendar-day.other-month {
            background: rgba(13, 17, 23, 0.5);
            opacity: 0.5;
        }
        
        .calendar-day.today {
            background: rgba(31, 111, 235, 0.15);
            box-shadow: inset 0 0 0 2px var(--primary-color);
        }
        
        .day-number {
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--text-primary);
        }
        
        .calendar-day.other-month .day-number {
            color: var(--text-secondary);
        }
        
        .calendar-events {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 0.25rem;
        }
        
        .calendar-event {
            background: var(--primary-color);
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .calendar-event:hover {
            transform: translateX(2px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        
        .event-text {
            background: linear-gradient(135deg, #1f6feb, #3b8cf7);
        }
        
        .event-image {
            background: linear-gradient(135deg, #7d3ac1, #9f5cc7);
        }
        
        .event-video {
            background: linear-gradient(135deg, #f85149, #ff6b6b);
        }
        
        .event-url {
            background: linear-gradient(135deg, #0d6efd, #0a58ca);
        }
        
        .event-slideshow {
            background: linear-gradient(135deg, #198754, #157347);
        }
        
        .event-inactive {
            opacity: 0.5;
            text-decoration: line-through;
        }
        
        .event-more {
            background: var(--border-color);
            color: var(--text-secondary);
            text-align: center;
        }
        
        .legend {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: var(--bg-dark);
            border-radius: 6px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .stat-card {
            background: var(--bg-dark);
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }
        
        .stat-card h6 {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        
        .stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .modal-header {
            border-bottom: 1px solid var(--border-color);
        }
        
        .modal-body {
            background: var(--bg-dark);
        }
        
        .content-preview {
            background: var(--bg-card);
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .content-preview img,
        .content-preview video {
            max-width: 100%;
            max-height: 200px;
            border-radius: 4px;
        }
        
        .btn-edit {
            background: var(--primary-color);
            color: white;
            border: none;
        }
        
        .btn-edit:hover {
            background: #1a5cd7;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-calendar-alt"></i> Content Scheduler
            </span>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-light" onclick="window.location.href='/narrowcast-admin.html'">
                    <i class="fas fa-arrow-left"></i> Back to Admin
                </button>
                <button class="btn btn-sm btn-outline-light" onclick="window.open('/narrowcast-display.html', '_blank')">
                    <i class="fas fa-tv"></i> Display
                </button>
            </div>
        </div>
    </nav>

    <div class="calendar-container">
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <h6>Active Content</h6>
                <div class="stat-value" id="stat-active">0</div>
            </div>
            <div class="stat-card">
                <h6>Scheduled Future</h6>
                <div class="stat-value" id="stat-scheduled">0</div>
            </div>
            <div class="stat-card">
                <h6>Currently Showing</h6>
                <div class="stat-value" id="stat-current">0</div>
            </div>
            <div class="stat-card">
                <h6>Total Content</h6>
                <div class="stat-value" id="stat-total">0</div>
            </div>
        </div>

        <!-- Legend -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #1f6feb, #3b8cf7);"></div>
                <span>Text</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #7d3ac1, #9f5cc7);"></div>
                <span>Image</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #f85149, #ff6b6b);"></div>
                <span>Video</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #0d6efd, #0a58ca);"></div>
                <span>URL</span>
            </div>
            <div class="legend-item">
                <div class="legend-color" style="background: linear-gradient(135deg, #198754, #157347);"></div>
                <span>Slideshow</span>
            </div>
            <div class="legend-item">
                <i class="fas fa-eye-slash text-secondary"></i>
                <span>Inactive</span>
            </div>
        </div>

        <!-- Calendar -->
        <div class="calendar">
            <div class="calendar-header">
                <button class="btn btn-sm btn-primary" onclick="changeMonth(-1)">
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <div class="calendar-title" id="calendarTitle">Loading...</div>
                <button class="btn btn-sm btn-primary" onclick="changeMonth(1)">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div class="calendar-grid" id="calendarDays">
                <!-- Days header -->
                <div class="calendar-day-header">Mon</div>
                <div class="calendar-day-header">Tue</div>
                <div class="calendar-day-header">Wed</div>
                <div class="calendar-day-header">Thu</div>
                <div class="calendar-day-header">Fri</div>
                <div class="calendar-day-header">Sat</div>
                <div class="calendar-day-header">Sun</div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- Generated by JavaScript -->
            </div>
        </div>
        
        <!-- Timeline View -->
        <div class="mt-4">
            <h5><i class="fas fa-list"></i> Upcoming Content</h5>
            <div id="timelineList"></div>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div class="modal fade" id="eventModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Content Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Content loaded dynamically -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-edit" id="editBtn" onclick="editContent()">
                        <i class="fas fa-edit"></i> Edit Content
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allContent = [];
        let currentEventId = null;
        let eventModal;
        let currentDate = new Date();

        document.addEventListener('DOMContentLoaded', async () => {
            eventModal = new bootstrap.Modal(document.getElementById('eventModal'));
            await loadContent();
            renderCalendar();
            renderTimeline();
        });

        async function loadContent() {
            try {
                const response = await fetch('/api/narrowcast/content?all=true');
                allContent = await response.json();
                updateStats();
                console.log('Loaded content:', allContent);
            } catch (error) {
                console.error('Error loading content:', error);
                alert('Failed to load content');
            }
        }

        function updateStats() {
            const now = new Date();
            const active = allContent.filter(c => c.active && isActiveNow(c, now)).length;
            const scheduled = allContent.filter(c => c.active && !isActiveNow(c, now)).length;
            const current = allContent.filter(c => c.active && isActiveNow(c, now)).length;
            
            document.getElementById('stat-active').textContent = active;
            document.getElementById('stat-scheduled').textContent = scheduled;
            document.getElementById('stat-current').textContent = current;
            document.getElementById('stat-total').textContent = allContent.length;
        }

        function isActiveNow(item, now) {
            if (item.start_time && new Date(item.start_time) > now) return false;
            if (item.end_time && new Date(item.end_time) < now) return false;
            return true;
        }

        function changeMonth(direction) {
            currentDate.setMonth(currentDate.getMonth() + direction);
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            // Update title
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('calendarTitle').textContent = `${monthNames[month]} ${year}`;
            
            // Get first day of month and total days
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            
            // Get day of week (0 = Sunday, adjust to Monday = 0)
            let startDayOfWeek = firstDay.getDay();
            startDayOfWeek = startDayOfWeek === 0 ? 6 : startDayOfWeek - 1; // Monday = 0
            
            // Calculate days to show from previous month
            const prevMonthDays = startDayOfWeek;
            const prevMonth = new Date(year, month, 0);
            const prevMonthLastDay = prevMonth.getDate();
            
            // Build calendar grid
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const today = new Date();
            const todayStr = formatDate(today);
            
            // Previous month days
            for (let i = prevMonthDays - 1; i >= 0; i--) {
                const day = prevMonthLastDay - i;
                const date = new Date(year, month - 1, day);
                grid.appendChild(createDayCell(date, true, todayStr));
            }
            
            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                grid.appendChild(createDayCell(date, false, todayStr));
            }
            
            // Next month days (to fill last week)
            const totalCells = grid.children.length;
            const remainingCells = 42 - totalCells; // 6 weeks max
            for (let day = 1; day <= remainingCells; day++) {
                const date = new Date(year, month + 1, day);
                grid.appendChild(createDayCell(date, true, todayStr));
            }
        }

        function createDayCell(date, isOtherMonth, todayStr) {
            const dayEl = document.createElement('div');
            dayEl.className = 'calendar-day';
            
            if (isOtherMonth) {
                dayEl.classList.add('other-month');
            }
            
            const dateStr = formatDate(date);
            if (dateStr === todayStr) {
                dayEl.classList.add('today');
            }
            
            // Day number
            const dayNumber = document.createElement('div');
            dayNumber.className = 'day-number';
            dayNumber.textContent = date.getDate();
            dayEl.appendChild(dayNumber);
            
            // Events for this day
            const eventsContainer = document.createElement('div');
            eventsContainer.className = 'calendar-events';
            
            const dayEvents = getEventsForDay(date);
            const maxVisible = 3;
            
            dayEvents.slice(0, maxVisible).forEach(content => {
                const eventEl = document.createElement('div');
                eventEl.className = `calendar-event event-${content.type}`;
                if (!content.active) eventEl.classList.add('event-inactive');
                eventEl.textContent = content.title;
                eventEl.onclick = (e) => {
                    e.stopPropagation();
                    showEventDetails(content);
                };
                eventsContainer.appendChild(eventEl);
            });
            
            if (dayEvents.length > maxVisible) {
                const moreEl = document.createElement('div');
                moreEl.className = 'calendar-event event-more';
                moreEl.textContent = `+${dayEvents.length - maxVisible} more`;
                moreEl.onclick = (e) => {
                    e.stopPropagation();
                    showDayEvents(date, dayEvents);
                };
                eventsContainer.appendChild(moreEl);
            }
            
            dayEl.appendChild(eventsContainer);
            
            return dayEl;
        }

        function getEventsForDay(date) {
            const dateStr = formatDate(date);
            
            return allContent.filter(content => {
                // Always active content (no scheduling)
                if (!content.start_time && !content.end_time) {
                    return true;
                }
                
                // Has scheduling
                const startDate = content.start_time ? formatDate(new Date(content.start_time)) : null;
                const endDate = content.end_time ? formatDate(new Date(content.end_time)) : null;
                
                // Single day event
                if (startDate && !endDate) {
                    return startDate === dateStr;
                }
                
                // Date range event
                if (startDate && endDate) {
                    return dateStr >= startDate && dateStr <= endDate;
                }
                
                return false;
            }).sort((a, b) => (b.priority || 0) - (a.priority || 0));
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function showEventDetails(content) {
            currentEventId = content.id;
            document.getElementById('modalTitle').textContent = content.title;
            
            let html = `
                <div>
                    <h6>Type</h6>
                    <span class="badge bg-primary">${content.type}</span>
                    <span class="badge ${content.active ? 'bg-success' : 'bg-secondary'}">${content.active ? 'Active' : 'Inactive'}</span>
                </div>
                
                <div class="mt-3">
                    <h6>Display Duration</h6>
                    <p>${content.display_duration} seconds</p>
                </div>
                
                ${content.priority ? `
                <div class="mt-3">
                    <h6>Priority</h6>
                    <p>${content.priority}</p>
                </div>
                ` : ''}
                
                ${content.start_time ? `
                <div class="mt-3">
                    <h6>Start Time</h6>
                    <p>${formatDateTime(content.start_time)}</p>
                </div>
                ` : ''}
                
                ${content.end_time ? `
                <div class="mt-3">
                    <h6>End Time</h6>
                    <p>${formatDateTime(content.end_time)}</p>
                </div>
                ` : ''}
            `;
            
            // Add preview based on type
            if (content.type === 'text') {
                html += `
                    <div class="mt-3">
                        <h6>Content Preview</h6>
                        <div class="content-preview" style="background: ${content.background_color}; color: ${content.text_color}; font-size: ${content.font_size}px;">
                            ${content.content || ''}
                        </div>
                    </div>
                `;
            } else if (content.type === 'image' && content.media_url) {
                html += `
                    <div class="mt-3">
                        <h6>Preview</h6>
                        <div class="content-preview">
                            <img src="${content.media_url}" alt="Preview">
                        </div>
                    </div>
                `;
            } else if (content.type === 'video' && content.media_url) {
                html += `
                    <div class="mt-3">
                        <h6>Preview</h6>
                        <div class="content-preview">
                            <video src="${content.media_url}" controls></video>
                        </div>
                    </div>
                `;
            } else if (content.type === 'url') {
                html += `
                    <div class="mt-3">
                        <h6>URL</h6>
                        <p><a href="${content.media_url}" target="_blank" style="color: var(--primary-color);">${content.media_url}</a></p>
                    </div>
                `;
            } else if (content.type === 'slideshow' && content.media_urls) {
                html += `
                    <div class="mt-3">
                        <h6>Slideshow (${content.media_urls.length} images)</h6>
                        <div class="content-preview d-flex flex-wrap gap-2">
                            ${content.media_urls.map(url => `<img src="${url}" alt="Slide" style="max-width: 150px;">`).join('')}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('modalBody').innerHTML = html;
            eventModal.show();
        }

        function showDayEvents(date, events) {
            const dateStr = formatDateTime(date);
            document.getElementById('modalTitle').textContent = `Events on ${dateStr}`;
            
            let html = '<div class="list-group">';
            events.forEach(content => {
                html += `
                    <div class="list-group-item bg-dark text-light border-secondary mb-2">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="mb-1">${escapeHtml(content.title)}</h6>
                                <span class="badge event-${content.type}">${content.type}</span>
                                ${!content.active ? '<span class="badge bg-secondary ms-1">Inactive</span>' : ''}
                            </div>
                            <button class="btn btn-sm btn-primary" onclick="editContent(${content.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            
            document.getElementById('modalBody').innerHTML = html;
            eventModal.show();
        }

        function renderTimeline() {
            const container = document.getElementById('timelineList');
            
            // Get upcoming content (has scheduling)
            const upcoming = allContent
                .filter(c => c.start_time)
                .sort((a, b) => new Date(a.start_time) - new Date(b.start_time));
            
            if (upcoming.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-secondary py-4">
                        <i class="fas fa-calendar-times fa-2x mb-2"></i>
                        <p>No scheduled content</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = upcoming.slice(0, 10).map(content => {
                const status = getStatusInfo(content);
                return `
                    <div class="content-card" style="cursor: pointer;" onclick="showEventDetails(${JSON.stringify(content).replace(/"/g, '&quot;')})">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-1">${escapeHtml(content.title)}</h6>
                                <div>
                                    <span class="badge event-${content.type}">${content.type}</span>
                                    <span class="badge bg-${status.badge} ms-1">${status.text}</span>
                                </div>
                                <div class="text-secondary mt-2" style="font-size: 0.9rem;">
                                    <i class="fas fa-play"></i> ${formatDateTime(content.start_time)}
                                    ${content.end_time ? `<br><i class="fas fa-stop"></i> ${formatDateTime(content.end_time)}` : ''}
                                </div>
                            </div>
                            <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); editContent(${content.id})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function getStatusInfo(item) {
            const now = new Date();
            if (!item.active) {
                return { status: 'inactive', badge: 'secondary', text: 'Inactive' };
            }
            if (!isActiveNow(item, now)) {
                return { status: 'scheduled', badge: 'warning', text: 'Scheduled' };
            }
            return { status: 'active', badge: 'success', text: 'Active' };
        }

        function editContent(id) {
            const contentId = id || currentEventId;
            if (contentId) {
                window.location.href = `/narrowcast-admin.html`;
                // Note: Could add ?edit=${contentId} if admin panel supports it
            }
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '—';
            const date = new Date(dateStr);
            return date.toLocaleString('nl-NL', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }
    </script>
</body>
</html>
