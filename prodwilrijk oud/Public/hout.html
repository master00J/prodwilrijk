<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hout Magazijnbeheer</title>
    <link rel="stylesheet" href="styles.css">
    <!-- jQuery wordt ingeladen -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="/jquery.min.js"></script>

</head>
<body>
    <!-- Plaats voor de dynamische header -->
    <div id="header-placeholder"></div>

    <div class="container">
        <h1>Hout Magazijnbeheer</h1>
        
        <!-- Formulier voor inkomend hout -->
        <section>
            <h2>Inkomend Hout Toevoegen</h2>
            <form id="addHoutForm">
                <label for="soort">Houtsoort:</label>
                <input type="text" id="soort" name="soort" required><br>

                <label for="lengte">Lengte (mm):</label>
                <input type="number" id="lengte" name="lengte" required><br>

                <label for="breedte">Breedte (mm):</label>
                <input type="number" id="breedte" name="breedte" required><br>

                <label for="dikte">Dikte (mm):</label>
                <input type="number" id="dikte" name="dikte" required><br>

                <label for="locatie">Locatie:</label>
                <input type="text" id="locatie" name="locatie" required><br>

                <label for="aantal">Aantal:</label>
                <input type="number" id="aantal" name="aantal" required><br>

                <button type="submit" class="btn">Voeg toe aan stock</button>
            </form>
        </section>

        <!-- Voorraadoverzicht -->
        <section>
            <h2>Hout op Voorraad</h2>
            <table id="stockTable">
                <thead>
                    <tr>
                        <th>Soort</th>
                        <th>Lengte (mm)</th>
                        <th>Breedte (mm)</th>
                        <th>Dikte (mm)</th>
                        <th>Locatie</th>
                        <th>Aantal</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <!-- Laad het hout.js script -->
    <script src="hout.js"></script>
    <script src="/jquery.min.js"></script>

</body>
</html>
