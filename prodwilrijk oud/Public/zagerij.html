<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zagerij Werkorders</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById("header-placeholder").innerHTML = data;
                });
        });
    </script>
    <style>
        /* your bestaande stijlen */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
            padding-top: 60px;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="container">
        <h1>Actieve Werkorders</h1>
        <div class="table-section">
            <h2>Werkorders</h2>
            <table>
                <thead>
                    <tr>
                        <th>Ordernummer</th>
                        <th>Beschrijving</th>
                        <th>Aantal Stuks</th>
                        <th>Status</th>
                        <th>Acties</th>
                    </tr>
                </thead>
                <tbody id="workorders-table-body"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal for workers count -->
    <div id="workersCountModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeWorkersCountModal">&times;</span>
            <h2>Aantal Werknemers</h2>
            <input type="number" id="workers-count" min="1" value="1">
            <button id="submitWorkersCount">Bevestigen</button>
        </div>
    </div>

    <!-- Modal for pause reasons -->
    <div id="pauseReasonModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2>Reden voor Pauze</h2>
            <select id="pause-reason-select" style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                <option value="Hout halen">Hout halen</option>
                <option value="Materiaal halen">Middag Pauze</option>
                <option value="Defect">Defect</option>
                <option value="Toilet">Einde werkdag</option>
            </select>
            <button id="submitPauseReason" style="padding: 10px 20px; border: none; background-color: #007bff; color: white; border-radius: 5px; cursor: pointer;">Bevestigen</button>
        </div>
    </div>

    <script src="scripts_zagerij_workorders.js"></script>
</body>
</html>
