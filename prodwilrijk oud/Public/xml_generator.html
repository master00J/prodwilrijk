<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0d6efd;
            margin-bottom: 30px;
        }
        .field-group {
            margin-bottom: 15px;
            padding: 15px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            background-color: #f8f9fa;
        }
        .btn-add-field {
            margin-bottom: 20px;
        }
        #xmlPreview {
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
            border: 1px solid #dee2e6;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }
        .btn-remove {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>XML Generator</h1>
        <p class="lead">Vul de velden in om een aangepast XML-bestand te maken.</p>

        <!-- Alert voor foutmeldingen -->
        <div id="errorAlert" class="alert alert-danger alert-dismissible fade show" role="alert" style="display: none;">
            <strong>Fout!</strong> <span id="errorMessage"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Sluiten"></button>
        </div>

        <form id="xmlForm">
            <div class="mb-3">
                <label for="rootElement" class="form-label">Naam rootelement:</label>
                <input type="text" class="form-control" id="rootElement" value="root" required>
            </div>

            <div id="fieldsContainer">
                <!-- Hier worden dynamisch velden toegevoegd -->
                <div class="field-group" id="field-1">
                    <div class="row">
                        <div class="col-md-5">
                            <label class="form-label">Element naam:</label>
                            <input type="text" class="form-control element-name" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Element waarde:</label>
                            <input type="text" class="form-control element-value">
                        </div>
                        <div class="col-md-2">
                            <button type="button" class="btn btn-danger btn-remove" onclick="removeField('field-1')">Verwijderen</button>
                        </div>
                    </div>
                    <div class="row mt-2">
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input has-attributes" type="checkbox" id="hasAttributes-1" onchange="toggleAttributes('field-1')">
                                <label class="form-check-label" for="hasAttributes-1">
                                    Attributen toevoegen
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="attributes-container" id="attributes-field-1" style="display: none;">
                        <div class="row mt-2">
                            <div class="col-md-5">
                                <label class="form-label">Attribuut naam:</label>
                                <input type="text" class="form-control attribute-name">
                            </div>
                            <div class="col-md-5">
                                <label class="form-label">Attribuut waarde:</label>
                                <input type="text" class="form-control attribute-value">
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-outline-primary btn-sm mt-4" onclick="addAttribute('field-1')">+ Attribuut</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button type="button" class="btn btn-primary btn-add-field" onclick="addField()">+ Veld toevoegen</button>
            
            <div class="row mt-4">
                <div class="col-md-6">
                    <button type="button" class="btn btn-success w-100" onclick="generateXML()">XML genereren</button>
                </div>
                <div class="col-md-6">
                    <button type="button" class="btn btn-outline-secondary w-100" onclick="downloadXML()">XML downloaden</button>
                </div>
            </div>

            <div class="mt-4">
                <h4>XML Voorbeeld:</h4>
                <div id="xmlPreview"><!-- Hier komt de XML preview --></div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="xml_generator.js"></script>
</body>
</html>
