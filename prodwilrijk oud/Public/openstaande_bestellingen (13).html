<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Openstaande Bestellijst</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    
    <style>
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            margin-bottom: 1.5rem;
        }
        
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
        
        .priority-row {
            background-color: #ffecb3;
        }
        
        .table th {
            background-color: #f8f9fa;
            border-top: none;
        }
        
        .progress {
            height: 0.5rem;
        }
        
        .badge {
            padding: 0.35em 0.65em;
        }

        /* Modal styles */
        .modal-header {
            background-color: #007bff;
            color: white;
        }

        .modal-footer .btn {
            min-width: 100px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <div class="container-fluid py-4">
        <div class="row mb-4">
            <div class="col">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="card-title mb-0">
                            <i class="fas fa-list"></i> Openstaande Bestellijst
                        </h4>
                    </div>
                    <div class="card-body">
                        <!-- Controles -->
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div>
                                <button id="select-all-pdf" class="btn btn-secondary">
                                    <i class="far fa-check-square"></i> Selecteer Alles
                                </button>
                                <button id="send-email" class="btn btn-primary ms-2">
                                    <i class="far fa-envelope"></i> Verzend PDF
                                </button>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="autoRefreshToggle">
                                <label class="form-check-label" for="autoRefreshToggle">
                                    Auto-verversen (30s)
                                </label>
                            </div>
                        </div>
                        
                        <!-- Tabel -->
                        <div class="table-responsive">
                            <table id="bestellingenTable" class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Houtsoort</th>
                                        <th>Lengte</th>
                                        <th>Dikte</th>
                                        <th>Breedte</th>
                                        <th>Aantal Pakken (Besteld)</th>
                                        <th>Aantal Pakken (Ontvangen)</th>
                                        <th>Aantal Pakken (Open)</th>
                                        <th>Planken/Pak</th>
                                        <th>BC Code</th>
                                        <th>Locatie</th>
                                        <th>Opmerkingen</th>
                                        <th>Besteld Op</th>
                                        <th>PDF</th>
                                        <th>Prioriteit</th>
                                        <th>Acties</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Rijen worden dynamisch toegevoegd via JavaScript -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- NIEUWE Modal for aanmelden package -->
        <div class="modal fade" id="aanmeldenPakketModal" tabindex="-1" aria-labelledby="aanmeldenPakketModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-lg"> <!-- Grotere modal voor meer velden -->
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="aanmeldenPakketModalLabel">Pakket Aanmelden voor Ontvangst</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Sluiten"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="aanmeldenBestellingId">
                        <p><strong>Bestelling:</strong> <span id="aanmeldenBestellingInfo"></span></p>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="aanmeldenPakketnummer" class="form-label">Pakketnummer *</label>
                                <input type="text" class="form-control" id="aanmeldenPakketnummer" required>
                            </div>
                            <div class="col-md-6">
                                <!-- Placeholder voor evt. toekomstige velden -->
                            </div>
                            <div class="col-md-4">
                                <label for="aanmeldenExacteDikte" class="form-label">Exacte Dikte (mm) *</label>
                                <input type="number" step="0.1" class="form-control" id="aanmeldenExacteDikte" required>
                            </div>
                            <div class="col-md-4">
                                <label for="aanmeldenExacteBreedte" class="form-label">Exacte Breedte (mm) *</label>
                                <input type="number" step="0.1" class="form-control" id="aanmeldenExacteBreedte" required>
                            </div>
                            <div class="col-md-4">
                                <label for="aanmeldenExacteLengte" class="form-label">Exacte Lengte (mm) *</label>
                                <input type="number" step="1" class="form-control" id="aanmeldenExacteLengte" required>
                            </div>
                            <div class="col-md-4">
                                <label for="aanmeldenPlankenPerPak" class="form-label">Planken per Pak *</label>
                                <input type="number" step="1" min="1" class="form-control" id="aanmeldenPlankenPerPak" required>
                            </div>
                            <div class="col-12">
                                <label for="aanmeldenOpmerking" class="form-label">Opmerking (optioneel)</label>
                                <textarea class="form-control" id="aanmeldenOpmerking" rows="2"></textarea>
                            </div>
                        </div>
                        <div id="aanmeldenError" class="text-danger mt-3" style="display: none;"></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuleren</button>
                        <button type="button" class="btn btn-primary" id="aanmeldenModalConfirm">Pakket Aanmelden</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="openstaande_bestellingen.js?v=2"></script>
</body>
</html>
