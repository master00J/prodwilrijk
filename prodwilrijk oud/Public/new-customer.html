<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodwilrijk - Nieuwe Klant</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 3rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            padding-bottom: 15px;
        }

        h1:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 4px;
            background: linear-gradient(to right, #3498db, #2ecc71);
            border-radius: 2px;
        }

        .form-section {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-section h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .form-control {
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        .btn-submit {
            background: linear-gradient(to right, #3498db, #2ecc71);
            border: none;
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .success-message {
            display: none;
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .error-message {
            display: none;
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .region-selector {
            margin-bottom: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nieuwe Klant Aanvraag</h1>
        
        <div class="form-section">
            <div class="region-selector">
                <h2><i class="fas fa-globe"></i> Selecteer Regio</h2>
                <select class="form-control" id="region-select">
                    <option value="nl">Nederland</option>
                    <option value="be">België</option>
                </select>
            </div>

            <form id="customer-form">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-building"></i> Bedrijfsnaam
                            </label>
                            <input type="text" class="form-control" name="companyName" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-user"></i> Contactpersoon
                            </label>
                            <input type="text" class="form-control" name="contactPerson" required>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-envelope"></i> Email
                            </label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label">
                                <i class="fas fa-phone"></i> Telefoonnummer
                            </label>
                            <input type="tel" class="form-control" name="phone" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" id="kvk-label">
                        <i class="fas fa-id-card"></i> KvK Nummer
                    </label>
                    <input type="text" class="form-control" name="kvkNumber" required>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-comments"></i> Opmerkingen
                    </label>
                    <textarea class="form-control" name="notes" rows="4"></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Verstuur Aanvraag
                </button>
            </form>

            <div class="success-message" id="success-message">
                Aanvraag succesvol verstuurd! U wordt doorgestuurd naar het dashboard.
            </div>
            <div class="error-message" id="error-message"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            const regionSelect = $('#region-select');
            const kvkLabel = $('#kvk-label');
            const form = $('#customer-form');
            const successMessage = $('#success-message');
            const errorMessage = $('#error-message');

            regionSelect.on('change', function() {
                const region = $(this).val();
                if (region === 'be') {
                    kvkLabel.html('<i class="fas fa-id-card"></i> KBO Nummer');
                } else {
                    kvkLabel.html('<i class="fas fa-id-card"></i> KvK Nummer');
                }
            });

            form.on('submit', async function(e) {
                e.preventDefault();
                const formData = {};
                const region = regionSelect.val();

                $(this).serializeArray().forEach(item => {
                    formData[item.name] = item.value;
                });

                try {
                    const response = await fetch('/customers/request', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-region': region
                        },
                        body: JSON.stringify(formData)
                    });

                    if (!response.ok) {
                        throw new Error('Er is iets misgegaan');
                    }

                    errorMessage.hide();
                    successMessage.show();
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 3000);
                } catch (error) {
                    successMessage.hide();
                    errorMessage.text(error.message).show();
                }
            });
        });
    </script>
</body>
</html>
