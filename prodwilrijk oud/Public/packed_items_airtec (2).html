<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packed Items Airtec</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    
    <style>
        .table {
            margin-bottom: 0;
        }

        .table th, .table td {
            padding: 0.5rem;
            white-space: nowrap;
        }

        /* Kolom breedtes */
        .table .col-id { width: 80px; }
        .table .col-beschrijving { width: 200px; }
        .table .col-item-number { width: 150px; }
        .table .col-lot-number { width: 150px; }
        .table .col-datum { width: 120px; }
        .table .col-kistnummer { width: 100px; }
        .table .col-divisie { width: 100px; }
        .table .col-quantity { width: 100px; }

        /* Zorg dat de inhoud van cellen niet omwikkelt */
        .table td {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Header rij styling */
        .table thead th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            font-weight: 500;
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            text-align: left;
        }

        /* Actie knoppen bovenaan */
        .actions-bar {
            padding: 1rem;
            background: white;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-container {
            position: relative;
            max-width: 300px;
        }

        .search-container i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }

        .search-container input {
            padding-left: 35px;
            height: 38px;
        }

        /* Filter sectie */
        .filter-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        /* Pagination controls */
        .pagination-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: white;
            margin-top: 1rem;
        }

        /* Report buttons */
        .report-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <!-- Pagination -->
        <div class="pagination-controls">
            <div class="d-flex align-items-center gap-2">
                <span>Rows per page:</span>
                <select id="rows-per-page" class="form-select" style="width: auto;">
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="250">250</option>
                    <option value="all">All</option>
                </select>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button id="prev-page" class="btn btn-outline-primary">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <span id="page-info">Page 1</span>
                <button id="next-page" class="btn btn-outline-primary">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    
    <div class="container-fluid py-3">
        <!-- Filter en Actie Knoppen -->
        <div class="actions-bar">
            <div class="d-flex gap-3 align-items-center">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-calendar"></i></span>
                    <input type="date" id="date-from" class="form-control" style="width: 150px;">
                </div>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-calendar"></i></span>
                    <input type="date" id="date-to" class="form-control" style="width: 150px;">
                </div>
                <div class="search-container">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search" class="form-control" placeholder="Zoeken...">
                </div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary" id="filter-button">
                    <i class="fas fa-filter me-1"></i> Filter
                </button>
                <button class="btn btn-success" id="download-button">
                    <i class="fas fa-download me-1"></i> Download
                </button>
                <button class="btn btn-info" id="email-button">
                    <i class="fas fa-envelope me-1"></i> Send Email
                </button>
                <button class="btn btn-secondary" id="report-button">
                    <i class="fas fa-chart-bar me-1"></i> Show Report
                </button>
            </div>
        </div>

        <div id="total-chests" class="alert alert-info">
            Total Chests Used: <span id="total-chests-value">0</span>
        </div>

        <!-- Tabel Card -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped">
                        <thead>
                            <tr>
                                <th class="col-id">ID</th>
                                <th class="col-beschrijving">Beschrijving</th>
                                <th class="col-item-number">Item Number</th>
                                <th class="col-lot-number">Lot Number</th>
                                <th class="col-datum">Datum Opgestuurd</th>
                                <th class="col-kistnummer">Kistnummer</th>
                                <th class="col-divisie">Divisie</th>
                                <th class="col-quantity">Quantity</th>
                                <th class="col-datum">Datum Ontvangen</th>
                                <th class="col-datum">Date Packed</th>
                            </tr>
                        </thead>
                        <tbody id="packed-items-table-body">
                            <!-- Data wordt hier dynamisch ingevoegd -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        

        <!-- Report Buttons -->
        <div class="report-buttons" id="report-period-buttons">
            <button id="daily-usage-button" class="btn btn-outline-secondary">Daily Usage</button>
            <button id="monthly-usage-button" class="btn btn-outline-secondary">Monthly Usage</button>
            <button id="yearly-usage-button" class="btn btn-outline-secondary">Yearly Usage</button>
        </div>

        <div id="average-usage-report" class="mt-3">
            <!-- Report content will be inserted here -->
        </div>
    </div>

    <!-- Report Modal -->
    <div class="modal" id="report-modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Chest Usage Report</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Total Amount of All Chests: <span id="total-amount-chests">0</span></p>
                <div id="report-content"></div>
            </div>
            <div class="modal-footer">
                <button id="download-report-button" class="btn btn-primary">
                    <i class="fas fa-download me-1"></i> Download Report
                </button>
                <button id="email-report-button" class="btn btn-info">
                    <i class="fas fa-envelope me-1"></i> Email Report
                </button>
                <button type="button" class="btn btn-secondary" id="close-report-button" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>  
    

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="scripts_packed_items_airtec.js"></script>
</body>
</html>
