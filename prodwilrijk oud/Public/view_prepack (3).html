<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Prepack Items</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    
    <style>
        .table {
            margin-bottom: 0;
        }

        .table th, .table td {
            padding: 0.5rem;
            white-space: nowrap;
        }

        /* Kolom breedtes */
        .table .col-checkbox { width: 40px; }
        .table .col-id { width: 80px; }
        .table .col-item-number { width: 150px; }
        .table .col-pallet-number { width: 150px; }
        .table .col-amount { width: 100px; }
        .table .col-received { width: 100px; }
        .table .col-actions { width: 100px; }

        /* Zorg dat de inhoud van cellen niet omwikkelt */
        .table td {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Header rij styling */
        .table thead th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            font-weight: 500;
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            text-align: left;
        }

        /* Actie knoppen bovenaan */
        .actions-bar {
            padding: 1rem;
            background: white;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-container {
            position: relative;
            max-width: 300px;
        }

        .search-container i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }

        .search-container input {
            padding-left: 35px;
            height: 38px;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <div class="container-fluid py-3">
        <!-- Action Bar -->
        <div class="actions-bar">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="search" class="form-control" placeholder="Zoeken...">
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-success" id="confirm-button">
                    <i class="fas fa-check me-1"></i> Confirm Checked
                </button>
                <button class="btn btn-primary" id="print-button">
                    <i class="fas fa-print me-1"></i> Print
                </button>
                <button class="btn btn-secondary" id="download-button">
                    <i class="fas fa-download me-1"></i> Download
                </button>
            </div>
        </div>

        <!-- Total Amount -->
        <div class="alert alert-info" id="total-amount">
            Total Amount: <span id="total-amount-value">0</span>
        </div>

        <!-- Main Table -->
        <div class="card mb-4">
            <div class="card-body p-0">
                <div class="table-responsive">
    <table class="table table-hover mb-0">
    <thead>
        <tr>
            <th><input type="checkbox" id="select-all">Received <span class="sort-indicator"></span></th>
            <th data-sort="id">ID <span class="sort-indicator"></span></th>
            <th data-sort="item_number">Item Number <span class="sort-indicator"></span></th>
            <th data-sort="po_number">Pallet Number <span class="sort-indicator"></span></th>
            <th data-sort="amount">Amount <span class="sort-indicator"></span></th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="incoming-goods-table-body">
    </tbody>
</table>
</div>

<style>
    th[data-sort] {
        cursor: pointer;
        user-select: none;
    }
    th[data-sort]:hover {
        background-color: rgba(0,0,0,0.05);
    }
    .sort-indicator {
        display: inline-block;
        width: 1em;
    }
</style>

        <!-- Forms Card -->
        <div class="card">
            <div class="card-body p-0">
                <!-- Add New Incoming Goods Form -->
                <form id="incoming-goods-form" class="p-3 border-bottom">
                    <h5 class="mb-3">Add New Incoming Goods</h5>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="item_number" class="form-label">Item Number</label>
                                <input type="text" id="item_number" name="item_number" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="po_number" class="form-label">PO Number</label>
                                <input type="text" id="po_number" name="po_number" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="amount" class="form-label">Amount</label>
                                <input type="number" id="amount" name="amount" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Submit
                            </button>
                        </div>
                    </div>
                </form>
                <div id="response-message" class="alert alert-success m-3 d-none"></div>

                <!-- Upload Multiple Form -->
                <div class="p-3 border-bottom">
                    <h5 class="mb-3">Upload Multiple Incoming Goods</h5>
                    <form id="upload-excel-form">
                        <div class="d-flex gap-2 align-items-center">
                            <input type="file" id="file-input" accept=".xlsx, .xls" class="form-control">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-upload me-1"></i> Upload
                            </button>
                        </div>
                    </form>
                    <div id="upload-response-message" class="alert alert-success mt-3 d-none"></div>
                </div>

                <!-- Problemen Items Form -->
                <form id="problemen-form" class="p-3">
                    <h5 class="mb-3">Submit Problemen Items</h5>
                    <div class="row g-3">
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="problem_item_number" class="form-label">Item Number</label>
                                <input type="text" id="problem_item_number" name="item_number" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="problem_amount" class="form-label">Amount</label>
                                <input type="number" id="problem_amount" name="amount" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="d_number" class="form-label">D Number</label>
                                <input type="text" id="d_number" name="d_number" class="form-control" required>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="andere_info" class="form-label">Andere Informatie</label>
                                <input type="text" id="andere_info" name="andere_info" class="form-control">
                            </div>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Submit
                            </button>
                        </div>
                    </div>
                    <div id="problemen-response-message" class="alert alert-success mt-3 d-none"></div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts_view_prepack.js"></script>
</body>
</html>
