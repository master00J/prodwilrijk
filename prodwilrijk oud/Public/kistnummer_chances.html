<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Kistnummer Wijzigingen - Admin</title>
  
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
  />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      min-height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }
    .container {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 3rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      padding-bottom: 15px;
    }
    h1:after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 4px;
      background: linear-gradient(to right, #3498db, #2ecc71);
      border-radius: 2px;
    }

    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    .card-header {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border-radius: 15px 15px 0 0;
      font-size: 1.25rem;
      font-weight: bold;
      color: #2c3e50;
      padding: 1rem 1.5rem;
    }

    .table th {
      background-color: #f8f9fa;
    }

    .table-hover tbody tr:hover {
      background-color: #f0f4f8;
    }

    /* Eventueel wat animatie bij nieuwe rijen */
    .highlight {
      animation: highlight-bg 1s ease;
    }
    @keyframes highlight-bg {
      from {
        background-color: #fffcc0;
      }
      to {
        background-color: white;
      }
    }
  </style>
</head>
<body>
  <!-- Menubalk geladen via header.html -->
  <div id="header-placeholder"></div>

  <div class="container">
    <h1>Kistnummer Wijzigingen</h1>
    <div class="card">
      <div class="card-header">
        <i class="fa fa-exchange-alt"></i> Recente Wijzigingen
      </div>
      <div class="card-body p-4">
        <div class="table-responsive">
          <table class="table table-hover table-striped align-middle" id="changes-table">
            <thead>
              <tr>
                <th scope="col">#ID</th>
                <th scope="col">Itemnummer</th>
                <th scope="col">Lotnummer</th>
                <th scope="col">Beschrijving</th>
                <th scope="col" class="text-center">Oud</th>
                <th scope="col" class="text-center">Nieuw</th>
                <th scope="col">Gewijzigd Op</th>
              </tr>
            </thead>
            <tbody id="changes-body">
              <!-- Dynamisch geladen via JavaScript -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS (optioneel) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 1. Header inladen
      fetch('/header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header-placeholder').innerHTML = data;
        })
        .catch(err => console.error('Error loading header:', err));

      // 2. Wijzigingen ophalen
      function fetchKistnummerChanges() {
        fetch('/api/kistnummer_changes')
          .then(response => {
            if (!response.ok) {
              throw new Error('Network response was not ok');
            }
            return response.json();
          })
          .then(data => {
            // Vullen van de tabel
            renderChanges(data);
          })
          .catch(error => {
            console.error('Error fetching kistnummer changes:', error);
            const tbody = document.getElementById('changes-body');
            tbody.innerHTML = `
              <tr>
                <td colspan="7" class="text-danger">
                  Er is een fout opgetreden bij het ophalen van de wijzigingen.
                </td>
              </tr>
            `;
          });
      }

      // 3. Tabel vullen
      function renderChanges(changes) {
        const tbody = document.getElementById('changes-body');
        tbody.innerHTML = '';
        changes.forEach(change => {
          const tr = document.createElement('tr');
          // Eventueel highlight effect
          tr.classList.add('highlight');

          tr.innerHTML = `
            <td>${change.id}</td>
            <td>${change.item_number || ''}</td>
            <td>${change.lot_number || ''}</td>
            <td>${change.beschrijving || ''}</td>
            <td class="text-center">${change.old_kistnummer || ''}</td>
            <td class="text-center">${change.new_kistnummer || ''}</td>
            <td>${formatDate(change.changed_at)}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      // 4. Datum formatteren (optioneel)
      function formatDate(dateString) {
        if (!dateString) return '-';
        const date = new Date(dateString);
        return date.toLocaleString('nl-BE', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      }

      // Direct ophalen bij laden:
      fetchKistnummerChanges();

      // Eventueel periodiek verversen, bv. elke 30 seconden:
      // setInterval(fetchKistnummerChanges, 30000);
    });
  </script>
</body>
</html>
