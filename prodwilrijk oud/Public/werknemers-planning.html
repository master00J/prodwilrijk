<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prodwilrijk - Werknemers Planning</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .planning-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .department-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .department-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .employee-list {
            min-height: 200px;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 10px;
            border: 2px dashed transparent;
        }

        .employee-list.dragover {
            border-color: #3498db;
            background: #e3f2fd;
        }

        .employee-card {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 1px solid #dee2e6;
            cursor: move;
            transition: transform 0.2s;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .employee-card:hover {
            transform: translateY(-2px);
        }

        .employee-card.dragging {
            opacity: 0.5;
        }

        .hours-input {
            width: 60px;
            text-align: center;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 2px;
        }

        .save-button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
        }

        .save-button:hover {
            background-color: #1d4ed8;
        }

        .total-hours {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .unassigned-employees {
            margin-bottom: 20px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">Werknemers Planning</h1>

        <!-- Niet toegewezen werknemers -->
        <div class="unassigned-employees">
            <div class="department-title">
                <i class="fas fa-user-plus"></i> 
                Niet Toegewezen Werknemers
            </div>
            <div id="unassigned" class="employee-list" 
                 ondrop="drop(event)" 
                 ondragover="allowDrop(event)">
                <!-- Werknemers worden hier dynamisch toegevoegd -->
            </div>
        </div>

        <!-- Afdelingen Grid -->
        <div class="planning-grid">
            <div class="department-card">
                <div class="department-title">
                    <i class="fas fa-box-open"></i> Prepack
                </div>
                <div id="prepack" class="employee-list" 
                     ondrop="drop(event)" 
                     ondragover="allowDrop(event)">
                </div>
                <div class="total-hours" id="prepack-total">Totaal uren: 0</div>
            </div>

            <div class="department-card">
                <div class="department-title">
                    <i class="fas fa-wind"></i> Airtec
                </div>
                <div id="airtec" class="employee-list" 
                     ondrop="drop(event)" 
                     ondragover="allowDrop(event)">
                </div>
                <div class="total-hours" id="airtec-total">Totaal uren: 0</div>
            </div>

            <div class="department-card">
                <div class="department-title">
                    <i class="fas fa-tree"></i> Houtvoorraad
                </div>
                <div id="hout" class="employee-list" 
                     ondrop="drop(event)" 
                     ondragover="allowDrop(event)">
                </div>
                <div class="total-hours" id="hout-total">Totaal uren: 0</div>
            </div>

            <div class="department-card">
                <div class="department-title">
                    <i class="fas fa-hammer"></i> Zagen
                </div>
                <div id="zagen" class="employee-list" 
                     ondrop="drop(event)" 
                     ondragover="allowDrop(event)">
                </div>
                <div class="total-hours" id="zagen-total">Totaal uren: 0</div>
            </div>

            <div class="department-card">
                <div class="department-title">
                    <i class="fas fa-tools"></i> Assemblage
                </div>
                <div id="assemblage" class="employee-list" 
                     ondrop="drop(event)" 
                     ondragover="allowDrop(event)">
                </div>
                <div class="total-hours" id="assemblage-total">Totaal uren: 0</div>
            </div>
        </div>

        <div class="text-center">
            <button onclick="savePlanning()" class="save-button">
                <i class="fas fa-save"></i> Planning Opslaan
            </button>
        </div>
    </div>

    <script>
        let assignments = {};
        let hours = {};
        let employees = [];
        
        // Helper functies voor drag & drop
        function allowDrop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('dragover');
        }

        function dragStart(ev) {
            ev.target.classList.add('dragging');
            ev.dataTransfer.setData("employee_id", ev.target.getAttribute('data-id'));
            ev.dataTransfer.setData("source_dept", ev.target.parentElement.id);
        }

        function dragEnd(ev) {
            ev.target.classList.remove('dragging');
            document.querySelectorAll('.employee-list').forEach(list => {
                list.classList.remove('dragover');
            });
        }

        function drop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('dragover');
            
            const employeeId = ev.dataTransfer.getData("employee_id");
            const sourceDept = ev.dataTransfer.getData("source_dept");
            const targetDept = ev.currentTarget.id;

            if (sourceDept === targetDept) return;

            // Update assignments
            if (sourceDept !== 'unassigned') {
                assignments[sourceDept] = assignments[sourceDept].filter(id => id !== employeeId);
            }
            
            if (targetDept !== 'unassigned') {
                if (!assignments[targetDept]) assignments[targetDept] = [];
                assignments[targetDept].push(employeeId);
            }

            // Move the element
            const employeeElement = document.querySelector(`[data-id="${employeeId}"]`);
            ev.currentTarget.appendChild(employeeElement);

            updateTotalHours();
        }

        function createEmployeeCard(employee) {
            const div = document.createElement('div');
            div.className = 'employee-card';
            div.setAttribute('draggable', true);
            div.setAttribute('data-id', employee.id);
            div.addEventListener('dragstart', dragStart);
            div.addEventListener('dragend', dragEnd);

            div.innerHTML = `
                <span>${employee.name}</span>
                <input type="number" 
                       class="hours-input" 
                       onchange="updateHours('${employee.id}', this)" 
                       placeholder="Uren"
                       value="${getEmployeeHours(employee.id) || ''}"
                >
            `;

            return div;
        }

        function getEmployeeHours(employeeId) {
            for (const dept in hours) {
                if (hours[dept][employeeId]) return hours[dept][employeeId];
            }
            return '';
        }

        function updateHours(employeeId, input) {
            const deptId = input.closest('.employee-list').id;
            if (!hours[deptId]) hours[deptId] = {};
            hours[deptId][employeeId] = input.value;
            updateTotalHours();
        }

        function updateTotalHours() {
            const departments = ['prepack', 'airtec', 'hout', 'zagen', 'assemblage'];
            departments.forEach(dept => {
                const total = Object.values(hours[dept] || {})
                    .reduce((sum, val) => sum + Number(val || 0), 0);
                document.getElementById(`${dept}-total`).textContent = `Totaal uren: ${total}`;
            });
        }

        function savePlanning() {
            fetch('/api/planning/save', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ assignments, hours })
            })
            .then(response => {
                if (response.ok) {
                    alert('Planning opgeslagen!');
                } else {
                    alert('Er ging iets mis bij het opslaan.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Er ging iets mis bij het opslaan.');
            });
        }

        // Laad initiële data
        Promise.all([
            fetch('/api/employees').then(res => res.json()),
            fetch('/api/planning/current').then(res => res.json())
        ])
        .then(([employeesData, planningData]) => {
            employees = employeesData;
            assignments = planningData.assignments || {};
            hours = planningData.hours || {};

            // Plaats werknemers in juiste afdelingen
            const assignedIds = new Set(Object.values(assignments).flat());
            
            employees.forEach(employee => {
                let employeeCard = createEmployeeCard(employee);
                
                // Bepaal waar de werknemer moet komen
                let placed = false;
                for (const [dept, empIds] of Object.entries(assignments)) {
                    if (empIds.includes(String(employee.id))) {
                        document.getElementById(dept).appendChild(employeeCard);
                        placed = true;
                        break;
                    }
                }
                
                if (!placed) {
                    document.getElementById('unassigned').appendChild(employeeCard);
                }
            });

            updateTotalHours();
        })
        .catch(error => {
            console.error('Error loading data:', error);
            alert('Er ging iets mis bij het laden van de data.');
        });
    </script>
</body>
</html>
