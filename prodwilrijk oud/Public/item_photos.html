<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itemfoto's koppelen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tinymce@6.8.3/tinymce.min.js" referrerpolicy="origin"></script>
    <style>
        .thumb { width: 160px; height: 120px; object-fit: cover; border-radius: 6px; border: 1px solid rgba(0,0,0,.1); }
    </style>
    </head>
<body>
    <div class="container py-4">
        <h3>Itemfoto's koppelen</h3>
        <div class="row g-3">
            <div class="col-lg-4">
                <div class="card p-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="m-0">Items</h5>
                        <span class="muted" id="indexCount">0</span>
                    </div>
                    <input id="searchBox" class="form-control mb-2" placeholder="Zoek itemnummer..." />
                    <div id="itemIndex" class="list-group" style="max-height:60vh; overflow:auto; border:1px solid #1f2a44; border-radius:6px;"></div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card p-3">
                    <div class="row g-2 align-items-end">
                        <div class="col-sm-6">
                            <label class="form-label">Itemnummer</label>
                            <input id="itemNumber" class="form-control" placeholder="bv. IT001" />
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label">Bestanden</label>
                            <input id="photos" type="file" class="form-control" multiple accept="image/*" />
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label">Tekst per foto (optioneel)</label>
                        <div id="captionsBox" class="d-grid gap-3"></div>
                        <div class="form-text">Je kan basisopmaak gebruiken: <code><b></b></code>, <code><i></i></code>, <code><u></u></code>, lijstjes en <code><br></br></code>.</div>
                    </div>
                    <div class="mt-3 d-flex gap-2">
                        <button id="btnUpload" class="btn btn-primary">Uploaden</button>
                        <button id="btnRefresh" class="btn btn-outline-secondary">Vernieuwen</button>
                    </div>

                    <div class="mt-3">
                        <div class="d-flex align-items-center gap-2">
                            <h5 class="m-0">Gekoppelde foto's</h5>
                            <span id="count" class="badge bg-info">0</span>
                            <span class="muted">Pad: /uploads/item-photos/</span>
                        </div>
                        <div id="list" class="row g-3 mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal voor bestaande caption bewerken -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tekst bewerken</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <textarea id="editCaption" rows="10"></textarea>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Annuleren</button>
                    <button id="saveEditBtn" class="btn btn-primary">Opslaan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
    const itemNumber = document.getElementById('itemNumber');
    const input = document.getElementById('photos');
    const captionsBox = document.getElementById('captionsBox');
    const list = document.getElementById('list');
    const btnUpload = document.getElementById('btnUpload');
    const btnRefresh = document.getElementById('btnRefresh');
    const count = document.getElementById('count');
    const itemIndex = document.getElementById('itemIndex');
    const searchBox = document.getElementById('searchBox');
    const indexCount = document.getElementById('indexCount');

    const API = window.location.origin;

    async function refresh(){
        const it = itemNumber.value.trim();
        if (!it) return;
        const res = await fetch(`${API}/api/items/${encodeURIComponent(it)}/photos`);
        const photos = await res.json();
        list.innerHTML = '';
        photos.forEach(p => {
            const col = document.createElement('div');
            col.className = 'col-auto';
            col.innerHTML = `
                <div class="text-center">
                    <img class="thumb" src="${p.url}" alt="${p.originalName}"><br>
                    <small class="muted">${p.originalName||''}</small><br>
                    <div class=\"d-flex gap-1 mt-1\">
                        <button class=\"btn btn-sm btn-outline-secondary\" data-edit=\"${p.id}\">Wijzig tekst</button>
                        <button class=\"btn btn-sm btn-outline-danger\" data-id=\"${p.id}\">Verwijderen</button>
                    </div>
                </div>`;
            list.appendChild(col);
            col.querySelector('button[data-id]')?.addEventListener('click', async () => {
                if (!confirm('Foto verwijderen?')) return;
                await fetch(`${API}/api/items/${encodeURIComponent(it)}/photos/${p.id}`, { method: 'DELETE' });
                await refresh();
            });
            col.querySelector('button[data-edit]')?.addEventListener('click', async () => {
                // open WYSIWYG modal
                const modalEl = document.getElementById('editModal');
                const saveBtn = document.getElementById('saveEditBtn');
                const areaId = 'editCaption';
                // init editor
                setTimeout(() => {
                    if (window.tinymce) {
                        const existing = tinymce.get(areaId);
                        if (existing) existing.remove();
                        tinymce.init({
                            selector: `#${areaId}`,
                            menubar: false,
                            height: 320,
                            plugins: 'lists link',
                            toolbar: 'undo redo | bold italic underline | bullist numlist | removeformat',
                            statusbar: false,
                            setup: (ed) => {
                                ed.on('init', () => { ed.setContent(p.caption || ''); });
                            }
                        });
                    } else {
                        document.getElementById(areaId).value = p.caption || '';
                    }
                }, 0);

                const bsModal = new bootstrap.Modal(modalEl);
                bsModal.show();
                const handler = async () => {
                    const ed = window.tinymce && tinymce.get(areaId);
                    const html = ed ? ed.getContent() : document.getElementById(areaId).value;
                    await fetch(`${API}/api/items/${encodeURIComponent(it)}/photos/${p.id}`, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ caption: html })
                    });
                    bsModal.hide();
                    saveBtn.removeEventListener('click', handler);
                    await refresh();
                };
                saveBtn.addEventListener('click', handler);
            });
        });
        count.textContent = photos.length;
    }

    // Genereer invoervelden voor captions per gekozen foto
    function initCaptionEditors(){
        // (Re)initialiseer TinyMCE voor alle caption textareas
        if (window.tinymce) {
            // Verwijder bestaande editors voor captionvelden
            tinymce.editors
                .filter(ed => ed.id.startsWith('cap-idx-'))
                .forEach(ed => ed.remove());
            tinymce.init({
                selector: 'textarea.caption-editor',
                menubar: false,
                height: 200,
                plugins: 'lists link',
                toolbar: 'undo redo | bold italic underline | alignleft aligncenter alignright | bullist numlist | removeformat',
                statusbar: false,
                content_style: 'body{font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif; font-size:16px;}'
            });
        }
    }

    input.addEventListener('change', () => {
        captionsBox.innerHTML = '';
        const files = Array.from(input.files || []);
        files.forEach((f, idx) => {
            const row = document.createElement('div');
            row.className = 'row g-2';
            row.innerHTML = `
                <div class="col-sm-4"><div class="form-control">${f.name}</div></div>
                <div class="col-sm-8">
                    <textarea class="form-control caption-editor" id="cap-idx-${idx}" rows="6" data-cap-idx="${idx}" placeholder="Tekst (WYSIWYG)"></textarea>
                </div>
            `;
            captionsBox.appendChild(row);
        });
        initCaptionEditors();
    });

    async function upload(){
        const it = itemNumber.value.trim();
        if (!it) return alert('Vul een itemnummer in');
        if (!input.files || input.files.length === 0) return alert('Kies minstens één bestand');
        const fd = new FormData();
        for (const f of input.files) fd.append('photos', f);
        // verzamel captions in dezelfde volgorde als de files
        const caps = [];
        Array.from(input.files).forEach((_, idx) => {
            const ed = window.tinymce && tinymce.get(`cap-idx-${idx}`);
            const html = ed ? ed.getContent() : (captionsBox.querySelector(`textarea#cap-idx-${idx}`)?.value || '');
            caps.push(html);
        });
        fd.append('captions', JSON.stringify(caps));
        const res = await fetch(`${API}/api/items/${encodeURIComponent(it)}/photos`, { method: 'POST', body: fd });
        if (!res.ok) return alert('Upload mislukt');
        input.value = '';
        captionsBox.innerHTML = '';
        await refresh();
        alert('Upload gelukt');
    }

    btnUpload.addEventListener('click', upload);
    btnRefresh.addEventListener('click', refresh);
    itemNumber.addEventListener('change', refresh);

    // Sidebar index
    async function loadIndex(q=''){
        const url = q ? `${API}/api/items/photos_index?q=${encodeURIComponent(q)}` : `${API}/api/items/photos_index`;
        const res = await fetch(url);
        const rows = await res.json();
        indexCount.textContent = rows.length;
        itemIndex.innerHTML = '';
        rows.forEach(r => {
            const a = document.createElement('a');
            a.href = '#';
            a.className = 'list-group-item list-group-item-action';
            a.style.background = '#0f1727';
            a.style.border = 'none';
            a.style.color = '#e6edf3';
            a.innerHTML = `<div class=\"d-flex justify-content-between\"><span>${r.itemNumber}</span><span class=\"muted\">${r.photoCount} foto(s)</span></div>`;
            a.addEventListener('click', (e)=>{
                e.preventDefault();
                itemNumber.value = r.itemNumber;
                refresh();
            });
            itemIndex.appendChild(a);
        });
    }
    loadIndex();
    searchBox.addEventListener('input', (e)=> loadIndex(e.target.value||''));
    </script>
</body>
</html>
