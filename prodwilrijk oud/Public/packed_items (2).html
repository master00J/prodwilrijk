<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packed Items</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    
    <style>
        .table {
            margin-bottom: 0;
        }

        .table th, .table td {
            padding: 0.5rem;
            white-space: nowrap;
        }

        /* Kolom breedtes */
        .table .col-id { width: 80px; }
        .table .col-item-number { width: 150px; }
        .table .col-pallet-number { width: 150px; }
        .table .col-amount { width: 100px; }
        .table .col-date-added { width: 120px; }
        .table .col-date-packed { width: 120px; }

        /* Zorg dat de inhoud van cellen niet omwikkelt */
        .table td {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Header rij styling */
        .table thead th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            font-weight: 500;
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            text-align: left;
        }

        /* Actie knoppen bovenaan */
        .actions-bar {
            padding: 1rem;
            background: white;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .statistics {
            display: flex;
            gap: 1rem;
        }

        .statistics .alert {
            margin: 0;
            padding: 0.5rem 1rem;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <div class="container-fluid py-3">
        <!-- Zoekfunctie -->
        <div class="d-flex gap-2 align-items-center mb-3">
            <input type="text" id="search-input" class="form-control" placeholder="Zoeken op itemnummer of palletnummer">
            <button id="search-button" class="btn btn-primary">
                <i class="fas fa-search me-1"></i> Zoeken
            </button>
        </div>

        <!-- Datum filters -->
        <div class="actions-bar">
            <div class="d-flex gap-3 align-items-center">
                <div class="d-flex gap-2 align-items-center">
                    <label for="date-from">Van:</label>
                    <input type="date" id="date-from" class="form-control">
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <label for="date-to">Tot:</label>
                    <input type="date" id="date-to" class="form-control">
                </div>
                <button id="filter-button" class="btn btn-primary">
                    <i class="fas fa-filter me-1"></i> Filter
                </button>
            </div>
            <div class="statistics">
                <div class="alert alert-info">
                    Totaal verpakt: <span id="total-packed">0</span>
                </div>
                <div class="alert alert-info">
                    Gemiddeld per dag: <span id="average-packed">0</span>
                </div>
                <div class="alert alert-info">
                    Gem. verblijfsduur: <span id="average-stay-duration">0</span> dagen
                </div>
            </div>
        </div>

        <!-- Main Table -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th class="col-id">ID</th>
                                <th class="col-item-number">Item Number</th>
                                <th class="col-pallet-number">Pallet Number</th>
                                <th class="col-amount">Amount</th>
                                <th class="col-date-added">Date Added</th>
                                <th class="col-date-packed">Date Packed</th>
                            </tr>
                        </thead>
                        <tbody id="packed-items-table-body">
                            <!-- Data wordt hier dynamisch ingevoegd -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-2 mt-3">
            <button onclick="printTable()" class="btn btn-secondary">
                <i class="fas fa-print me-1"></i> Print Table
            </button>
            <button onclick="downloadTable()" class="btn btn-secondary">
                <i class="fas fa-download me-1"></i> Download Table
            </button>
            <button id="show-overdue-button" class="btn btn-warning">
                <i class="fas fa-clock me-1"></i> Toon items ouder dan 7D
            </button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts_packed_items.js"></script>
</body>
</html>
