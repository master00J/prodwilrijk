<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtec Incoming Goods</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    
    <style>
        .table {
            margin-bottom: 0;
        }

        .table th, .table td {
            padding: 0.5rem;
            white-space: nowrap;
        }

        /* Kolom breedtes */
        .table .col-beschrijving { width: 200px; }
        .table .col-item-number { width: 150px; }
        .table .col-lot-number { width: 150px; }
        .table .col-datum { width: 120px; }
        .table .col-kistnummer { width: 100px; }
        .table .col-divisie { width: 100px; }
        .table .col-quantity { width: 100px; }
        .table .col-actions { width: 100px; }

        /* Zorg dat de inhoud van cellen niet omwikkelt */
        .table td {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Header rij styling */
        .table thead th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            font-weight: 500;
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            text-align: left;
        }

        /* Actie knoppen bovenaan */
        .actions-bar {
            padding: 1rem;
            background: white;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Form controls in table */
        .table input.form-control {
            padding: 0.25rem 0.5rem;
            height: auto;
        }

        /* Upload section styling */
        .upload-section {
            padding: 1rem;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <div class="container-fluid py-3">
        <div class="actions-bar">
            <h4 class="mb-0">Input Airtec Incoming Goods</h4>
            <div class="d-flex gap-2">
                <button type="submit" form="incoming-goods-form" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i> Submit
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <form id="incoming-goods-form">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th class="col-beschrijving">Beschrijving</th>
                                    <th class="col-item-number">Item Number</th>
                                    <th class="col-lot-number">Lot Number</th>
                                    <th class="col-datum">Datum Opgestuurd</th>
                                    <th class="col-kistnummer">Kistnummer</th>
                                    <th class="col-divisie">Divisie</th>
                                    <th class="col-quantity">Aantal</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><input type="text" id="beschrijving" name="beschrijving" required class="form-control"></td>
                                    <td><input type="text" id="item_number" name="item_number" required class="form-control"></td>
                                    <td><input type="text" id="lot_number" name="lot_number" class="form-control"></td>
                                    <td><input type="date" id="datum_opgestuurd" name="datum_opgestuurd" required class="form-control"></td>
                                    <td><input type="text" id="kistnummer" name="kistnummer" required class="form-control"></td>
                                    <td><input type="text" id="divisie" name="divisie" class="form-control"></td>
                                    <td><input type="number" id="quantity" name="quantity" value="1" required class="form-control"></td>
                                </tr>
                            </tbody>
                        </table>
                    </form>
                    <div id="response-message" class="alert alert-success d-none m-3"></div>

                    <div class="upload-section">
                        <h5>Upload Multiple Incoming Goods</h5>
                        <form id="upload-excel-form" class="d-flex gap-2 align-items-center mt-2">
                            <input type="file" id="file-input" accept=".xlsx, .xls" class="form-control">
                            <button type="submit" id="upload-button" class="btn btn-primary">
                                <i class="fas fa-upload me-1"></i> Upload
                            </button>
                        </form>
                        <div id="upload-response-message" class="alert alert-success d-none mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="row-count-modal" class="modal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Upload Result</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="row-count-message"></p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts_airtec.js"></script>
</body>
</html>
