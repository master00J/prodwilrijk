<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Overzicht</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    
    <style>
        body {
            font-size: 16px;
        }
        
        .chart-container {
            position: relative;
            height: 70vh;
            width: 100%;
            margin-bottom: 2rem;
        }
        
        .stats-banner {
            background-color: #e9ecef;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stats-box {
            display: flex;
            gap: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-number {
            font-size: 1.75rem;
            font-weight: bold;
            line-height: 1;
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: #6c757d;
        }
        
        .filters-container {
            background-color: #f8f9fa;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
        }
        
        .data-table-container {
            overflow-x: auto;
            margin-top: 2rem;
        }

        @media (max-width: 992px) {
            .stats-banner {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <div class="container-fluid py-3">
        <!-- Statistieken Banner -->
        <div class="stats-banner">
            <div class="stats-box">
                <div class="stat-item">
                    <div class="stat-number" id="total-open-items">0</div>
                    <div class="stat-label">Openstaande Items</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="total-packed-items">0</div>
                    <div class="stat-label">Verpakte Items</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="backlog-days">0</div>
                    <div class="stat-label">Dagen Backlog</div>
                </div>
            </div>
            <div class="last-updated text-muted" id="last-updated">
                Laatst bijgewerkt: Nooit
            </div>
        </div>
        
        <!-- Filters -->
        <div class="filters-container">
            <div class="row">
                <div class="col-md-4">
                    <label for="date-range">Datumbereik:</label>
                    <select id="date-range" class="form-select">
                        <option value="7">Afgelopen 7 dagen</option>
                        <option value="14" selected>Afgelopen 14 dagen</option>
                        <option value="30">Afgelopen 30 dagen</option>
                        <option value="90">Afgelopen 90 dagen</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="chart-type">Grafiektype:</label>
                    <select id="chart-type" class="form-select">
                        <option value="bar">Staafdiagram</option>
                        <option value="line" selected>Lijndiagram</option>
                        <option value="stacked-bar">Gestapeld Staafdiagram</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label for="data-group">Groeperen op:</label>
                    <select id="data-group" class="form-select">
                        <option value="day" selected>Per Dag</option>
                        <option value="week">Per Week</option>
                        <option value="month">Per Maand</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- Grafiek -->
        <div class="card">
            <div class="card-body">
                <div class="chart-container">
                    <canvas id="order-chart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- Tabel met daggegevens -->
        <div class="data-table-container">
            <h3>Detailoverzicht</h3>
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Openstaande items</th>
                        <th>Verpakte items</th>
                        <th>Totaal</th>
                    </tr>
                </thead>
                <tbody id="data-table-body">
                    <!-- Hier komen de tabelrijen -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="scripts_orders_overview.js"></script>
</body>
</html>
