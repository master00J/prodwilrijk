<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kisten Voorraadbeheer</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
        }
        .container {
            width: 90%;
            margin: 20px auto;
        }
        h1, h2 {
            color: #333;
        }
        .section {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
        }
        .content {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 5px;
        }
        input[type="text"], input[type="number"] {
            width: calc(100% - 22px);
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 16px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f0f0f5;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="container">
        <h1>Kisten Voorraadbeheer</h1>

        <div class="section">
            <h2>Overzicht Voorraad en Benodigde Kisten</h2>
            <table id="combined-stock-table">
                <thead>
                    <tr>
                        <th>Kistnummer</th>
                        <th>Huidige Voorraad</th>
                        <th>Benodigde Kisten</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="section">
            <h2>Voorraad Invoeren</h2>
            <div class="content">
                <form id="add-stock-form" class="form-group">
                    <label for="kistnummer">Kistnummer:</label>
                    <input type="text" id="kistnummer" name="kistnummer" required>
                    <label for="quantity">Aantal:</label>
                    <input type="number" id="quantity" name="quantity" required>
                    <button type="submit">Invoeren</button>
                </form>
            </div>
        </div>
    </div>

    <script src="admin_stock.js"></script>
</body>
</html>
