<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prepack System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- XLSX Library from jsdelivr instead of cdnjs -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
    <!-- Header placeholder -->
    <div id="header-placeholder"></div>

    <div class="container-fluid py-3">
        <div class="card">
            <div class="card-body p-0">
                <!-- Incoming Goods Form -->
                <section class="p-3 border-bottom">
                    <h5 class="mb-3">Input Incoming Goods</h5>
                    <form id="incoming-goods-form">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="item_number">Item Number</label>
                                    <input type="text" class="form-control" id="item_number" name="item_number" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="po_number">PO Number</label>
                                    <input type="text" class="form-control" id="po_number" name="po_number" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="form-group">
                                    <label for="amount">Amount</label>
                                    <input type="number" class="form-control" id="amount" name="amount" required>
                                </div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary">Submit</button>
                            </div>
                        </div>
                    </form>
                    <div id="response-message" class="alert alert-success mt-3" style="display: none;"></div>
                </section>

                <!-- Excel Upload Section -->
                <section class="p-3 border-bottom">
                    <h5 class="mb-3">Upload Multiple Incoming Goods</h5>
                    <form id="upload-excel-form">
                        <div class="d-flex gap-2 align-items-center">
                            <input type="file" id="file-input" class="form-control" accept=".xlsx, .xls">
                            <button type="submit" id="upload-button" class="btn btn-primary">Upload</button>
                        </div>
                        <div id="upload-response-message" class="alert alert-success mt-3" style="display: none;"></div>
                    </form>
                </section>

                <!-- Problemen Items Form -->
                <section class="p-3">
                    <h5 class="mb-3">Submit Problemen Items</h5>
                    <form id="problemen-form">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label for="problemen_item_number">Item Number</label>
                                    <input type="text" class="form-control" id="problemen_item_number" name="item_number" required>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label for="problemen_amount">Amount</label>
                                    <input type="number" class="form-control" id="problemen_amount" name="amount" required>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label for="d_number">D Number</label>
                                    <input type="text" class="form-control" id="d_number" name="d_number" required>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="form-group">
                                    <label for="andere_informatie">Andere Informatie</label>
                                    <input type="text" class="form-control" id="andere_informatie" name="andere_informatie">
                                </div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-primary">Submit</button>
                            </div>
                        </div>
                    </form>
                    <div id="problemen-response-message" class="alert alert-success mt-3" style="display: none;"></div>
                </section>
            </div>
        </div>
    </div>

    <!-- Upload Result Modal -->
    <div class="modal fade" id="row-count-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Upload Result</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body"></div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="scripts.js"></script>
</body>
</html>
