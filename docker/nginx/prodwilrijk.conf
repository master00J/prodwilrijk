# Reverse proxy voor prodwilrijk.be (op de VM zelf, niet in Docker)
#
# Installatie (Ubuntu):
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo cp docker/nginx/prodwilrijk.conf /etc/nginx/sites-available/prodwilrijk
#   sudo ln -s /etc/nginx/sites-available/prodwilrijk /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d prodwilrijk.be -d www.prodwilrijk.be -d api.prodwilrijk.be
#
# Vereist: Docker draait met poorten op localhost
#   - Next.js  → 127.0.0.1:3000
#   - Supabase → 127.0.0.1:8000

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name prodwilrijk.be www.prodwilrijk.be api.prodwilrijk.be;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Webapplicatie
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name prodwilrijk.be www.prodwilrijk.be;

    # Certbot vult ssl_certificate-paden in
    ssl_certificate /etc/letsencrypt/live/prodwilrijk.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prodwilrijk.be/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}

# Supabase API (Auth, REST, Storage, Realtime)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.prodwilrijk.be;

    ssl_certificate /etc/letsencrypt/live/prodwilrijk.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prodwilrijk.be/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
